version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: therapynote_dev
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: therapynote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # S3-compatible object storage for local dev (real AWS S3 in production)
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
volumes:
  postgres_data:
  minio_data:
